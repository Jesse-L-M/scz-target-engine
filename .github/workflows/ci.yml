name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - Jesse-L-M/**

permissions:
  contents: read

jobs:
  tests-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run full test suite
        run: uv run --group dev pytest

      - name: Run artifact registry contract tests
        run: uv run --group dev pytest tests/test_artifacts.py

      - name: Run contract-frozen smoke path
        run: ./scripts/run_contract_smoke_path.sh
